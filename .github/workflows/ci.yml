name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate dynamic runner platform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: '1.25.7'
          cache-dependency-path: controller/go.sum

      - name: Test controller
        working-directory: controller
        run: go test -race ./...

      - name: Vet controller
        working-directory: controller
        run: go vet ./...

      - name: Build controller image
        run: docker build --file controller/Dockerfile --tag gha-runner-controller:test controller

      - name: Compile Bicep
        run: az bicep build --file infra/main.bicep --stdout >/dev/null

      - name: Validate Packer runner image
        run: |
          mkdir -p "$RUNNER_TEMP/packer-config"
          docker run --rm \
            -v "$PWD/image:/workspace" \
            -v "$RUNNER_TEMP/packer-config:/root/.config/packer" \
            -w /workspace \
            hashicorp/packer:1.15.4 \
            init runner.pkr.hcl
          docker run --rm \
            -v "$PWD/image:/workspace" \
            -v "$RUNNER_TEMP/packer-config:/root/.config/packer" \
            -w /workspace \
            hashicorp/packer:1.15.4 \
            validate \
              -var subscription_id=00000000-0000-0000-0000-000000000000 \
              -var resource_group_name=gha-runners-validation \
              -var managed_image_name=validation-only \
              runner.pkr.hcl

      - name: Syntax-check scripts
        run: |
          bash -n scripts/deploy-azure.sh
          bash -n scripts/destroy-azure.sh
          bash -n image/scripts/install-runner-toolchain.sh

      - name: Verify safe dry runs
        run: |
          ./scripts/deploy-azure.sh --dry-run \
            --subscription-id 00000000-0000-0000-0000-000000000000 \
            --github-organization ExampleOrg \
            --runner-pools-file runner-pools.example.json
          ./scripts/destroy-azure.sh --dry-run \
            --subscription-id 00000000-0000-0000-0000-000000000000
          pwsh -NoProfile -File scripts/deploy-azure.ps1 \
            -SubscriptionId 00000000-0000-0000-0000-000000000000 \
            -GitHubOrganization ExampleOrg \
            -RunnerPoolsFile runner-pools.example.json
          pwsh -NoProfile -File scripts/destroy-azure.ps1 \
            -SubscriptionId 00000000-0000-0000-0000-000000000000
