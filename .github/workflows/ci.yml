name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate config and dry-run plans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install pyyaml

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate example config
        run: ./scripts/validate-config.sh --config config/runners.example.yaml

      - name: Render dry-run plan artifact
        run: ./scripts/render-plan.sh --config config/runners.example.yaml --out artifacts/plan.json

      - name: Render Azure deploy dry-run plan
        run: ./scripts/deploy-azure.sh --config config/runners.example.yaml --dry-run

      - name: Render Azure destroy dry-run plan
        run: ./scripts/destroy-azure.sh --config config/runners.example.yaml --dry-run

      - name: Upload dry-run plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-actions-runners-plan
          path: artifacts/plan.json
