version: 1
project: github-actions-runners
defaults:
  totalRunnerCap: 20
  github:
    tokenProvider:
      type: command
      command: scripts/github-runner-token.example.sh
runnerPools:
  - name: sh-linux
    os: linux
    arch: x64
    maxRunners: 15
  - name: sh-linux-lg
    os: linux
    arch: x64
    maxRunners: 10
accounts:
  - kind: user
    owner: example-user
    visibility: private
    repositories:
      - name: repo-one
        fullName: example-user/repo-one
        pool: sh-linux
        maxRunners: 15
        registration:
          runnerUrl: https://github.com/example-user/repo-one
      - name: repo-two
        fullName: example-user/repo-two
        pool: sh-linux-lg
        maxRunners: 10
        registration:
          runnerUrl: https://github.com/example-user/repo-two
